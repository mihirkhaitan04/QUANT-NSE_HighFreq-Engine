      Reserved_OER6:                                          #22
      PAN:                                                    #10
      Reserved_OER7:                                          #66


# MessagesEnum is used by the Decoder to identify which message type
# is arriving, based on the TransactionCode byte at position MESSAGE_LOC.
MessagesEnum:
  dataType: uint16_t
  data:
    SIGNONREQUEST: 2300
    ORDERENTRYREQUEST: 2000

Enums:
  Transcodes:
    data:
      SIGN_ON_REQUEST_IN : 2300
      MS_OE_REQUEST: 2000
    dataType: uint16_t

Fields:
# Basic header mssg
  MessageLength:             { dataType: int16_t }
  TransactionCode:           { dataType: int16_t }
  LogTime:                   { dataType: int32_t }
  AlphaChar:                 { dataType: char*, dataLen: 2 }
  UserId:                    { dataType: int32_t }
  UserId2:                   { dataType: int32_t }
  ErrorCode:                 { dataType: int16_t }
  Timestamp:                 { dataType: int64_t }
  TimeStamp1:                { dataType: int64_t }
  TimeStamp2:                { dataType: int64_t }
# SignOnRequest code
  Reserved_SOR1:             { dataType: char*, dataLen: 8 }
  Password:                  { dataType: char*, dataLen: 8 }
  Reserved_SOR2:             { dataType: char*, dataLen: 8 }
  NewPassword:               { dataType: char*, dataLen: 8 }
  TraderName:                { dataType: char*, dataLen: 26 }
  LastPasswordChangeDate:    { dataType: int32_t }
  BrokerId:                  { dataType: char*, dataLen: 5 }
  Reserved_SOR3:             { dataType: char*, dataLen: 3 }
  VersionNumber:             { dataType: int32_t }
  Reserved_SOR4:             { dataType: char*, dataLen: 66 }
  WsClassName:               { dataType: char*, dataLen: 14 }
  Reserved_SOR5:             { dataType: char*, dataLen: 7 }
  BrokerName:                { dataType: char*, dataLen: 25 }
  ReservedEnd_SOR1:          { dataType: char*, dataLen: 16 }
  ReservedEnd_SOR2:          { dataType: char*, dataLen: 16 } 
  ReservedEnd_SOR3:          { dataType: char*, dataLen: 16 } 
# Order Request
  ParticipantType:           { dataType: char*, dataLen: 1 }
  Reserved_OER1:             { dataType: char*, dataLen: 13 }
  TokenNo:                   { dataType: int32_t } 
  InstrumentName:            { dataType: char*, dataLen: 6 }
  Symbol:                    { dataType: char*, dataLen: 10 }
  ExpiryDate:                { dataType: int32_t }
  StrikePrice:               { dataType: int32_t }
  OptionType:                { dataType: char*, dataLen: 2 }
  CALevel:                   { dataType: int16_t }      
  Reserved_OER2:             { dataType: char*, dataLen: 10 }
  OrderType:                 { dataType: int16_t }
  OrderNumber:               { dataType: int64_t }  
  AccountNumber:             { dataType: char*, dataLen: 10 }
  BookType:                  { dataType: int16_t }
  Buy_SellIndicator:         { dataType: int16_t }
  DisclosedVolume:           { dataType: int32_t }    
  Reserved_OER3:             { dataType: char*, dataLen: 8 }
  Volume:                    { dataType: int32_t }
  Reserved_OER4:             { dataType: char*, dataLen: 4 }
  Price:                     { dataType: int32_t }
  TriggerPrice:              { dataType: int32_t }
  GoodTillDate:              { dataType: int32_t }  
  Reserved_OER5:             { dataType: char*, dataLen: 49 }
  Open_Close:                { dataType: char*, dataLen: 1 }
  Settlor:                   { dataType: char*, dataLen: 12 }   
  Pro_ClientIndicator:       { dataType: int16_t }
  SettlementPeriod:          { dataType: int16_t }
  Reserved_OER6:             { dataType: char*, dataLen: 22 }
  PAN:                       { dataType: char*, dataLen: 10 }
  Reserved_OER7:             { dataType: char*, dataLen: 66 }




