      TransactionCode: TranscodesEnum::SIGN_ON_REQUEST_IN  #2
      LogTime:                                                #4
      AlphaChar:                                              #2
      UserId:                                                 #4
      ErrorCode:                                              #2
      Timestamp:                                              #8
      TimeStamp1:                                             #8
      TimeStamp2:                                             #8
      MessageLength:                                          #2

      UserId2:                                                #4
      Reserved_SOR1:                                          #8
      Password:                                               #8
      Reserved_SOR2:                                          #8
      NewPassword:                                            #8
      TraderName:                                             #26
      LastPasswordChangeDate:                                 #4
      BrokerId:                                               #5 
      Reserved_SOR3:                                          #3
      VersionNumber:                                          #4
      Reserved_SOR4:                                          #66
      WsClassName:                                            #14
      Reserved_SOR5:                                          #7
      BrokerName:                                             #25
      ReservedEnd_SOR1:                                       #16
      ReservedEnd_SOR2:                                       #16
      ReservedEnd_SOR3:                                       #16

  OrderEntryRequest:
    Fields:
      TransactionCode: TranscodesEnum::MS_OE_REQUEST       #2
      LogTime:                                                #4
      AlphaChar:                                              #2
      UserId:                                                 #4
      ErrorCode:                                              #2
      Timestamp:                                              #8
      TimeStamp1:                                             #8
      TimeStamp2:                                             #8
      MessageLength:                                          #2
      
      ParticipantType:                                        #1
      Reserved_OER1:                                          #13
      TokenNo:                                                #4
      InstrumentName:                                         #6
      Symbol:                                                 #10
      ExpiryDate:                                             #4  
      StrikePrice:                                            #4
      OptionType:                                             #2
      CALevel:                                                #2
      Reserved_OER2:                                          #10
      OrderType:                                              #2
      OrderNumber:                                            #8
      AccountNumber:                                          #10
      BookType:                                               #2
      Buy_SellIndicator:                                      #2
      DisclosedVolume:                                        #4
      Reserved_OER3:                                          #8
      Volume:                                                 #4
      Reserved_OER4:                                          #4
      Price:                                                  #4
      TriggerPrice:                                           #4
      GoodTillDate:                                           #4
